<form method="POST" action="{% url 'calendario:cita_create' %}"
      hx-post="{% url 'calendario:cita_create' %}"
      hx-target="#cita-list"
      hx-swap="beforeend">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn" style="margin-top:.75rem;">Guardar cita</button>
</form>
