<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calendario</title>
  <meta name="csrf-token" content="{{ csrf_token }}">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    document.addEventListener("htmx:configRequest", (e) => {
      e.detail.headers["X-CSRFToken"] = document.querySelector('meta[name="csrf-token"]').content;
    });
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; color: #1e293b; padding: 2rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block; padding: .45rem 1rem; border-radius: 6px;
      font-size: .875rem; font-weight: 500; cursor: pointer; border: none;
      background: #2563eb; color: #fff;
    }
    .btn:hover { background: #1d4ed8; }
    .btn-danger { background: #dc2626; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-ghost { background: transparent; border: 1px solid #cbd5e1; color: #475569; }
    .btn-ghost:hover { background: #f1f5f9; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    th { background: #f1f5f9; text-align: left; padding: .65rem 1rem; font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: #64748b; }
    td { padding: .7rem 1rem; border-top: 1px solid #f1f5f9; font-size: .9rem; vertical-align: middle; }
    .color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    #form-container { margin-bottom: 1.5rem; }
    input[type="text"], input[type="date"], input[type="time"], select, textarea {
      width: 100%;
      padding: 6px 10px;
      border: 0.5px solid #cbd5e1;
      border-radius: 6px;
      font-size: .875rem;
      color: #1e293b;
      background: #fff;
    }
    input[type="text"]:focus, input[type="date"]:focus,
    input[type="time"]:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2563eb;
    }
    textarea { resize: vertical; min-height: 80px; }
  </style>
</head>
<body>
  <h1>📅 Calendario</h1>

  <a href="{% url 'calendario:sugerir_reprogramacion' today %}" class="btn" style="background:#5e8cf1;">
    📊 Analizar agenda
  </a>

  <div style="margin-top: 2rem;">

    <!-- Campo IA con voz -->
    <form id="form-voz"
          hx-post="{% url 'calendario:cita_desde_texto' %}"
          hx-target="#form-container"
          hx-swap="innerHTML">
      {% csrf_token %}
      <input type="text"
             id="id-texto-voz"
             name="texto"
             placeholder="Describe tu cita..." />
      <div style="display:flex;gap:.5rem;margin-top:.5rem">
        <button type="submit" class="btn">Describe tu cita...</button>
        <button type="button" id="btn-hablar" class="btn btn-ghost" onclick="activarVoz()">
          🎙️ Hablar
        </button>
      </div>
      <p id="aviso-voz" style="display:none;font-size:.8rem;color:#dc2626;margin-top:.3rem">
        Tu navegador no soporta entrada de voz — usa el campo de texto.
      </p>
    </form>

    <!-- Formulario / botón nueva cita -->
    <div id="form-container" style="margin-top:1rem;">
      <button
        class="btn"
        hx-get="{% url 'calendario:cita_create' %}"
        hx-target="#form-container"
        hx-swap="innerHTML">
        + Nueva cita
      </button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Título</th>
        <th>Inicio</th>
        <th>Fin</th>
        <th>Hora</th>
        <th>Categoría</th>
        <th>Prioridad</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="cita-list">
      {% for cita in citas %}
        {% include "calendario/partials/cita_row.html" %}
      {% empty %}
        <tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:2rem">Sin citas</td></tr>
      {% endfor %}
    </tbody>
  </table>

  <div
    hx-get="{% url 'calendario:cita_boton' %}"
    hx-trigger="citaGuardada from:body"
    hx-target="#form-container"
    hx-swap="innerHTML">
  </div>

  <script>
function activarVoz() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    document.getElementById("aviso-voz").style.display = "block";
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "es-ES";
  recognition.interimResults = false;

  const btn = document.getElementById("btn-hablar");
  btn.textContent = "🔴 Escuchando...";
  btn.disabled = true;

  recognition.onresult = (e) => {
    const texto = e.results[0][0].transcript;
    console.log("Texto reconocido:", texto);
    document.getElementById("id-texto-voz").value = texto;
    document.getElementById("form-voz").requestSubmit();
  };

  recognition.onerror = (e) => {
    console.log("Error de voz:", e.error);
  };

  recognition.onend = () => {
    console.log("Reconocimiento terminado");
    btn.textContent = "🎙️ Hablar";
    btn.disabled = false;
  };

  recognition.start();
}

  </script>

</body>
</html>
